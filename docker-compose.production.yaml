services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: star_burger
      POSTGRES_USER: star_burger
      POSTGRES_PASSWORD: star_burger
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn star_burger.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      SECRET_KEY: django-insecure-local-production-test-key
      DEBUG: "False"
      ALLOWED_HOSTS: "star-burger.online,www.star-burger.online,77.105.170.71,127.0.0.1,localhost"
      DATABASE_URL: postgres://star_burger:star_burger@db:5432/star_burger
      ROLLBAR_ACCESS_TOKEN: ""
      ROLLBAR_ENVIRONMENT: ""
    volumes:
      - /var/www/star-burger/static:/app/staticfiles
      - /var/www/star-burger/media:/app/media
      - bundles:/app/bundles
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: ./node_modules/.bin/parcel build bundles-src/index.js --dist-dir bundles --public-url=./
    volumes:
      - bundles:/app/bundles

volumes:
  postgres_data:
  bundles:
